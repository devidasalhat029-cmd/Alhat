{% extends "baseofhtml.html" %}

{% block title %}
Disease Detection Result
{% endblock %}

{% block content %}

<style>

.result-card{
    max-width:900px;
    margin:30px auto;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.result-card h2{
    color:#16a34a;
    text-align:center;
    margin-bottom:25px;
}

.result{
    display:flex;
    gap:30px;
    align-items:center;
    flex-wrap:wrap;
}

.result img{
    width:320px;
    border-radius:15px;
    border:4px solid #16a34a;
}

.info{
    flex:1;
}

.info h3{
    color:#16a34a;
    margin-bottom:15px;
}

.info p{
    font-size:18px;
    margin:10px 0;
}

.btn-back{
    display:inline-block;
    margin-top:20px;
    background:#16a34a;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:10px;
}

.btn-back:hover{
    background:#15803d;
}

</style>

<div class="result-card">

<h2>
<i class="fas fa-leaf"></i>
 Plant Disease Detection Result
</h2>

<div class="result">

<img src="/{{ image }}" alt="Leaf Image">

<div class="info">

<h3>🦠 Disease: {{ disease }}</h3>

<p><strong>🎯 Confidence:</strong> {{ confidence }}</p>

<p><strong>💊 Treatment:</strong><br>
{{ treatment }}
</p>

<a href="/disease" class="btn-back">
<i class="fas fa-arrow-left"></i>
 Detect Another Image
</a>

</div>

</div>

</div>

{% endblock %}
