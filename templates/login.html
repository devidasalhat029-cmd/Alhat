{% extends "baseofhtml.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<style>

.login-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

.login-card{
    width:450px;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.login-header{
    text-align:center;
    margin-bottom:25px;
}

.login-header i{
    font-size:70px;
    color:#16a34a;
    margin-bottom:10px;
}

.login-header h1{
    color:#16a34a;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    font-weight:bold;
    display:block;
    margin-bottom:8px;
}

.input-box{
    position:relative;
}

.input-box i{
    position:absolute;
    left:15px;
    top:15px;
    color:#16a34a;
}

.input-box input{
    width:100%;
    padding:14px 14px 14px 45px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

.input-box input:focus{
    border-color:#16a34a;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    background:#16a34a;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#15803d;
}

.register-link{
    text-align:center;
    margin-top:15px;
}

.register-link a{
    color:#16a34a;
    text-decoration:none;
    font-weight:bold;
}

</style>

<div class="login-container">

<div class="login-card">

<div class="login-header">

<i class="fas fa-seedling"></i>

<h1>Farmer Login</h1>

<p>Smart Agriculture Monitoring System</p>

</div>

<form method="POST">

<div class="input-group">

<label>Username</label>

<div class="input-box">

<i class="fas fa-user"></i>

<input type="text"
name="username"
placeholder="Enter Username"
required>

</div>

</div>

<div class="input-group">

<label>Password</label>

<div class="input-box">

<i class="fas fa-lock"></i>

<input type="password"
name="password"
placeholder="Enter Password"
required>

</div>

</div>

<button type="submit" class="btn">

<i class="fas fa-right-to-bracket"></i>
 Login

</button>

</form>

<div class="register-link">

Don't have an account?

<a href="/register">
Register Here
</a>

</div>

</div>

</div>

{% endblock %}
