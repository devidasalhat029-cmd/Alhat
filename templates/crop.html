{% extends "baseofhtml.html" %}

{% block title %}
Crop Management
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center text-success mb-4">
            🌾 Crop Management
        </h2>

        <form action="/add_crop" method="POST">

            <div class="row">

                <div class="col-md-5 mb-3">
                    <input
                    type="text"
                    name="crop_name"
                    class="form-control"
                    placeholder="Enter Crop Name"
                    required>
                </div>

                <div class="col-md-5 mb-3">
                    <input
                    type="text"
                    name="season"
                    class="form-control"
                    placeholder="Enter Season"
                    required>
                </div>

                <div class="col-md-2 mb-3">
                    <button
                    type="submit"
                    class="btn btn-success w-100">
                        Add
                    </button>
                </div>

            </div>

        </form>

    </div>

    <br>

    <div class="card shadow p-3">

        <h4 class="text-primary mb-3">
            Crop Records
        </h4>

        <table class="table table-bordered table-hover text-center">

            <thead class="table-success">

                <tr>
                    <th>ID</th>
                    <th>Crop Name</th>
                    <th>Season</th>
                    <th>Edit</th>
                    <th>Delete</th>
                </tr>

            </thead>

            <tbody>

                {% for crop in data %}

                <tr>

                    <td>{{ crop.id }}</td>

                    <td>{{ crop.crop_name }}</td>

                    <td>{{ crop.season }}</td>

                    <td>
                        <a href="/edit_crop/{{ crop.id }}"
                        class="btn btn-warning btn-sm">
                            Edit
                        </a>
                    </td>

                    <td>
                        <a href="/delete_crop/{{ crop.id }}"
                        class="btn btn-danger btn-sm"
                        onclick="return confirm('Are you sure you want to delete this crop?')">
                            Delete
                        </a>
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
