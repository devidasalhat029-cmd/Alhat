<!DOCTYPE html>
<html>
<head>

<title>{% block title %}{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fa;
}

.navbar{
background:#198754;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:white;
font-size:24px;
font-weight:bold;
text-decoration:none;
}

.nav-links{
display:flex;
gap:15px;
flex-wrap:wrap;
align-items:center;
}

.nav-links a{
color:white;
text-decoration:none;
padding:8px 15px;
border-radius:8px;
transition:.3s;
}

.nav-links a:hover{
background:white;
color:#198754;
}

.search-form{
display:flex;
align-items:center;
gap:10px;
margin-left:20px;
}

.search-input{
width:180px;
height:42px;
border:none;
border-radius:8px;
padding:0 12px;
outline:none;
}

.search-btn{
height:42px;
padding:0 18px;
border:2px solid white;
background:#198754;
color:white;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

.search-btn:hover{
background:white;
color:#198754;
}

.main-content{
padding:25px;
}

.footer{
background:#198754;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}
.dark{
background:#121212 !important;
color:white;
}

.dark .navbar{
background:#000 !important;
}

.dark .footer{
background:#000;
}

.dark .main-content{
background:#121212;
color:white;
}

.dark .card{
background:#1f1f1f !important;
color:white;
}

.dark .title{
background:#000 !important;
}

.dark .status{
background:#1f1f1f !important;
color:white;
}

</style>

</head>

<body>

<nav class="navbar expand-lg navbar-dark shadow-sm" style="background-color: #198754;">

<a href="/" class="logo">
🌾 Agro Monitor
</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="mainNav">
    <ul class="navbar-nav me-auto align-items-lg-center">
        <li class="nav-item">
            <a class="nav-link" href="/">🏠 Home</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/dashboard">📊Dashboard</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/farmer" > 👨‍🌾 Farmer Profile</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/ai_assistant">🤖 AI</a>
        </li>
        <a href="/ai_advice">💡AI Advice</a>
        <li class="nav-item">
            <a class="nav-link" href="/crop">🌱Crop</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/weather">🌦️ Weather</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/irrigation">💧 Irrigation</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/motor">⚙️ Motor</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/live_farm">🌾 live_farm</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/records">📋 Records</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/analytics">📈 Analytics</a>
        </li>
    </ul>
</div>



<form class="search-form" action="/search" method="POST">

<input
type="text"
name="search"
class="search-input"
placeholder="Search"
required>

<button type="submit" class="search-btn">
Search
</button>

</form>
<button onclick="darkMode()"
style="
margin-left:15px;
padding:8px 15px;
border:none;
border-radius:8px;
background:#222;
color:white;
cursor:pointer;">
🌙 Dark Mode
</button>

</nav>

<div class="main-content">

{% block content %}
{% endblock %}

</div>

<div class="footer">
Automatic Agriculture Monitoring System © 2026
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function darkMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
