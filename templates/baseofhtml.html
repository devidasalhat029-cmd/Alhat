<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}{% endblock %}</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
display:flex;
background:#f4f7fc;
}

.sidebar{
width:270px;
height:100vh;
background:linear-gradient(180deg,#0f172a,#1e293b);
position:fixed;
overflow:auto;
}

.logo{
text-align:center;
padding:25px;
color:white;
}

.logo i{
font-size:50px;
color:#22c55e;
margin-bottom:10px;
}

.sidebar a{
display:block;
padding:15px 20px;
color:white;
text-decoration:none;
transition:.3s;
font-size:16px;
}

.sidebar a i{
width:30px;
}

.sidebar a:hover{
background:#22c55e;
padding-left:30px;
}

.main{
margin-left:270px;
width:100%;
}

.topbar{
background:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.profile i{
font-size:40px;
color:#22c55e;
cursor:pointer;
}

.content{
padding:20px;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

<i class="fas fa-seedling"></i>

<h2>AgroTech</h2>

</div>

<a href="/dashboard">
<i class="fas fa-chart-line"></i>
Dashboard
</a>

<a href="/farmer">
<i class="fas fa-user"></i>
Farmer
</a>

<a href="/crop">
<i class="fas fa-seedling"></i>
Crop Recommendation
</a>

<a href="/weather">
<i class="fas fa-cloud-sun-rain"></i>
Weather Forecast
</a>

<a href="/motor">
<i class="fas fa-faucet-drip"></i>
Motor Control
</a>

<a href="/record">
<i class="fas fa-database"></i>
Records
</a>

<a href="/analysis">
<i class="fas fa-chart-pie"></i>
Analytics
</a>

<a href="/logout">
<i class="fas fa-right-from-bracket"></i>
Logout
</a>

</div>

<div class="main">

<div class="topbar">

<h2>🌾 Agriculture Monitoring System</h2>

<div class="profile">

<i class="fas fa-user-circle"></i>

</div>

</div>

<div class="content">

{% block content %}
{% endblock %}

</div>

</div>

</body>
</html>
