{% extends "baseofhtml.html" %}

{% block title %}
Irrigation Schedule
{% endblock %}

{% block content %}

<style>

body{
    background:#e8f5e9;
    font-family:Arial,sans-serif;
}

h2{
    text-align:center;
    color:#0f7a36;
    margin:30px 0;
    font-weight:bold;
}

.card{
    background:white;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    padding:25px;
    margin-bottom:30px;
}

.table{
    background:white;
}

.table thead{
    background:#16a34a;
    color:white;
    text-align:center;
}

.table tbody{
    text-align:center;
}

.btn-save{
    background:#16a34a;
    color:white;
    border:none;
    border-radius:8px;
    padding:10px 30px;
}

.btn-save:hover{
    background:#15803d;
}

</style>

<div class="container">

<h2>🚿 Smart Irrigation Schedule</h2>

<form method="POST">

<div class="card">

<div class="row">

<div class="col-md-4">
<label><b>Crop Name</b></label>
<input
type="text"
name="crop_name"
class="form-control"
placeholder="Enter Crop Name"
required>
</div>

<div class="col-md-4">
<label><b>Water Time</b></label>
<input
type="time"
name="water_time"
class="form-control"
required>
</div>

<div class="col-md-4">
<label><b>Duration (Minutes)</b></label>
<input
type="number"
name="duration"
class="form-control"
placeholder="30"
required>
</div>

</div>

<div class="text-center mt-4">
<button type="submit" class="btn-save">
💾 Save Schedule
</button>
</div>

</div>

</form>

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>Crop</th>

<th>Time</th>

<th>Duration</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>
    {% for r in records %}

<tr>

    <td>{{ r[1] }}</td>

    <td>{{ r[2] }}</td>

    <td>{{ r[3] }} Min</td>

    <td>
        <span class="badge bg-success">
            {{ r[4] }}
        </span>
    </td>

    <td>

        <a href="{{ url_for('delete_irrigation', id=r[0]) }}"
           class="btn btn-danger btn-sm"
           onclick="return confirm('Do you want to delete this schedule?')">
           🗑️ Delete
        </a>

    </td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
