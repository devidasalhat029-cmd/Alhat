{% extends "baseofhtml.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}
<style>

.edit-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

.edit-card{
    width:550px;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.edit-card h1{
    text-align:center;
    color:#166534;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
}

.btn{
    width:100%;
    padding:14px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:10px;
    font-size:17px;
}

</style>


<div class="edit-container">

<div class="edit-card">

<h1>✏️ Edit Farmer Profile</h1>

<form method="POST">

<div class="input-group">
<label>Name</label>
<input type="text" name="name" value="{{ farmer[1] }}">
</div>


<div class="input-group">
<label>Mobile</label>
<input type="text" name="mobile" value="{{ farmer[2] }}">
</div>


<div class="input-group">
<label>Village</label>
<input type="text" name="village" value="{{ farmer[3] }}">
</div>


<div class="input-group">
<label>Username</label>
<input type="text" value="{{ farmer[4] }}" readonly>
</div>


<button class="btn">
Update Profile
</button>

</form>

</div>

</div>


{% endblock %}
